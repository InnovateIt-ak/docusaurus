services:
  docusaurus:
    build:
      dockerfile: Dockerfile
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/srv/app

  # PDF generation with WeasyPrint. Started only with the "pdf" profile, e.g.
  #   docker compose --profile pdf run --rm weasyprint
  # It reads ./build and writes ./build/documentation.pdf
  weasyprint:
    profiles: ["pdf"]
    build:
      dockerfile: docker/weasyprint/Dockerfile
      context: .
    volumes:
      - .:/data
    command:
      - "--build-dir=/data/build"
      - "--output=/data/build/documentation.pdf"
      - "--base-url=/"
      - "--title=My Site"
      - "--eyebrow=Documentation"
      - "--subtitle=Dinosaurs are cool"
      # Skip the auto-generated category index pages (already covered by the
      # table of contents) and the interactive LikeC4 diagram page.
      - "--exclude=/docs/category/,/docs/tutorial-basics/architecture/"