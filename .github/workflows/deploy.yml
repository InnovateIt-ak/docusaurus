name: Build and Deploy Docusaurus

on:
  push:
    branches:
      - master  # ou master selon votre branche principale
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docs section exported to PDF. Change here to point the PDF at another section.
  PDF_SECTION: architecture

# Un seul déploiement Pages à la fois (évite que push master et PR se télescopent).
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy-github-pages:
    runs-on: [ubuntu-latest]
    # Publie sur GitHub Pages aussi bien sur push master que sur une pull request.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
      || github.event_name == 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # PlantUML server so the remark plugin can render diagrams at build time.
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty
        ports:
          - 8080:8080
    env:
      PLANTUML_BUILD_URL: http://localhost:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PlantUML server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && { echo "PlantUML is up"; exit 0; }
            sleep 2
          done
          echo "::warning::PlantUML server did not become ready; diagrams may render as placeholders"

      - name: Build Docusaurus
        run: BASE_URL="/docusaurus" npm run build

      - name: Generate PDF with WeasyPrint
        env:
          SECTION: ${{ env.PDF_SECTION }}
        run: |
          docker build -f docker/weasyprint/Dockerfile -t docusaurus-weasyprint .
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/data" docusaurus-weasyprint \
            --build-dir /data/build \
            --output /data/build/documentation.pdf \
            --base-url /docusaurus \
            --title "My Site — Architecture" \
            --eyebrow "Software Architecture" \
            --subtitle "arc42 / MADR architecture documentation" \
            --toc-title "Table of Contents" \
            --source "https://innovateit-ak.github.io/docusaurus" \
            --include "/docs/${SECTION}/"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Generate the section PDF on every push and pull request and expose it as an
  # artifact (useful for review before anything is deployed). Delegated to the
  # reusable pdf.yml workflow; change `section` to export another section.
  build-pdf:
    uses: ./.github/workflows/pdf.yml
    with:
      section: architecture
      base-url: /
      artifact-name: documentation-pdf