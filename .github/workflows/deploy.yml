name: Build and Deploy Docusaurus

on:
  push:
    branches:
      - master  # ou master selon votre branche principale
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-github-pages:
    runs-on: [ubuntu-latest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: BASE_URL="/docusaurus" npm run build

      - name: Generate PDF with WeasyPrint
        run: |
          docker build -f docker/weasyprint/Dockerfile -t docusaurus-weasyprint .
          docker run --rm -v "$PWD:/data" docusaurus-weasyprint \
            --build-dir /data/build \
            --output /data/build/documentation.pdf \
            --base-url /docusaurus \
            --title "My Site" \
            --eyebrow "Documentation" \
            --subtitle "Dinosaurs are cool" \
            --source "https://innovateit-ak.github.io/docusaurus" \
            --exclude /docs/tutorial-basics/architecture/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Generate the PDF on every push and pull request and expose it as an
  # artifact (useful for review before anything is deployed).
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: BASE_URL="/" npm run build

      - name: Generate PDF with WeasyPrint
        run: |
          docker build -f docker/weasyprint/Dockerfile -t docusaurus-weasyprint .
          docker run --rm -v "$PWD:/data" docusaurus-weasyprint \
            --build-dir /data/build \
            --output /data/build/documentation.pdf \
            --base-url / \
            --title "My Site" \
            --eyebrow "Documentation" \
            --subtitle "Dinosaurs are cool" \
            --exclude /docs/tutorial-basics/architecture/

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: build/documentation.pdf