name: Section PDF (release)

# On every version tag (vX.Y.Z) — or on a manual run where you type the version
# (and optionally a section) — build that docs section's PDF and open a pull
# request adding it under docs/<section>/releases/, one PDF per version. Defaults
# to the "architecture" section; tag pushes always use it.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to label the PDF (e.g. v1.2.0)'
        required: true
      section:
        description: 'Docs section to export (folder name under docs/)'
        required: false
        default: 'architecture'

permissions:
  contents: write
  pull-requests: write

jobs:
  architecture-pdf-pr:
    runs-on: ubuntu-latest

    # PlantUML server so the remark plugin can render diagrams at build time.
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty
        ports:
          - 8080:8080
    env:
      PLANTUML_BUILD_URL: http://localhost:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and section
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.version }}"
            section="${{ github.event.inputs.section }}"
          else
            tag="${GITHUB_REF_NAME}"
            section="architecture"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "section=${section:-architecture}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PlantUML server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && { echo "PlantUML is up"; exit 0; }
            sleep 2
          done
          echo "::warning::PlantUML server did not become ready; diagrams may render as placeholders"

      - name: Build Docusaurus
        run: BASE_URL="/" npm run build

      - name: Generate PDF with WeasyPrint
        env:
          PDF_SECTIONS: ${{ steps.ver.outputs.section }}
        run: |
          docker build -f docker/weasyprint/Dockerfile -t docusaurus-weasyprint .
          bash docker/weasyprint/generate-all.sh /

      - name: Stage PDF into the repo
        run: |
          section="${{ steps.ver.outputs.section }}"
          mkdir -p "docs/${section}/releases"
          cp "build/${section}.pdf" \
             "docs/${section}/releases/${section}-${{ steps.ver.outputs.tag }}.pdf"

      # The org disables "Allow GitHub Actions to create and approve pull
      # requests", so the default GITHUB_TOKEN cannot open a PR. The branch is
      # pushed with the default token, and the PR is opened with a PAT exposed
      # as the RELEASE_PR_TOKEN secret (scopes: contents + pull-requests write).
      # If the secret is absent the branch is still pushed and the manual
      # "create PR" link is printed instead of failing the job.
      - name: Open pull request with the section PDF
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          section="${{ steps.ver.outputs.section }}"
          branch="docs/${section}-pdf-${tag}"
          file="docs/${section}/releases/${section}-${tag}.pdf"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          git add "$file"
          if git diff --cached --quiet; then
            echo "PDF unchanged for ${tag}; nothing to propose."
            exit 0
          fi

          git commit -m "docs(${section}): ${section} PDF for ${tag}"
          git push -u origin "$branch" --force

          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::RELEASE_PR_TOKEN secret is not set — branch pushed but PR not opened."
            echo "Open it manually: https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"
            exit 0
          fi

          gh pr create \
            --base master \
            --head "$branch" \
            --title "docs: ${section} PDF for ${tag}" \
            --body "Automated ${section} documentation PDF generated for **${tag}**.

          Source: \`docs/${section}/\` rendered with the hardened WeasyPrint image.
          File: \`${file}\`" \
          || gh pr edit "$branch" \
            --title "docs: ${section} PDF for ${tag}"
